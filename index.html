<script>

];

const D={};PR.forEach(p=>D[p.id]={msgs:[],unread:0,rf:false});
let cur=null,ls=null,aInt=null,aCd=null,pTmr=null;

const TL=["10:32 AM","11:04 AM","11:48 AM","12:15 PM","1:02 PM","2:34 PM","3:17 PM","4:50 PM","6:09 PM","8:22 PM"];
const rt=()=>TL[Math.floor(Math.random()*TL.length)];
const nt=()=>new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const mo=()=>{const h=new Date().getHours();return h>=6&&h<13;};
const rn=a=>a[Math.floor(Math.random()*a.length)];

const NM=["জান বাবু কি করেন?","বাবু কই আছেন?","ফ্রি আছি রে বাবু","কই কল দিচ্ছেন না?","আরে বাবা আমি ফিরে আছি","বাবু কেমন আছেন?","কল দেন না কেন?","বাবু আছেন?","baby কলে আসো","আমারে মিস করতেছেন?"];
const GM=["জান","কি বলেন?","হুম?","কি করেন?","বলেন?","আছেন?","আরে বাবু!","ফ্রি আছি","কল দেন না কেন?","আসেন কথা বলি","কই আছেন?"];
const RF2=["জান","কি"];
const RR=["হুম?","বলেন?","কি করেন?","আছেন?"];

function rl(f=''){
  const el=document.getElementById('cl');el.innerHTML='';
  PR.filter(p=>p.name.toLowerCase().includes(f.toLowerCase())).forEach(p=>{
    const d=D[p.id],last=d.msgs.length?d.msgs[d.msgs.length-1]:null;
    const prev=last?(last.out?'You: '+last.text:last.text):'Tap to chat';
    const div=document.createElement('div');div.className='ci';
    div.innerHTML=`<div class="cav"><img src="${p.img}" alt="" loading="lazy"><div class="od"></div></div>
      <div class="cb"><div class="nr"><span class="cn">${p.name}</span><span class="ct2">${last?nt():rt()}</span></div>
      <div class="pr"><span class="cpr">${prev}</span>${d.unread>0?`<span class="ub">${d.unread}</span>`:''}</div></div>`;
    div.onclick=()=>oc(p);el.appendChild(div);
  });
}
document.getElementById('search-input').addEventListener('input',e=>rl(e.target.value));

function oc(p){
  cur=p;D[p.id].unread=0;
  document.getElementById('home').style.display='none';
  document.getElementById('cv').style.display='flex';
  document.getElementById('cvi').src=p.img;
  document.getElementById('cvn').textContent=p.name;
  rm();
  if(p.isMain&&D[p.id].msgs.length===0)setTimeout(()=>dv(p,"Hi কি করেন?"),900);
  setTimeout(()=>showPop(),12000);
}
function goHome(){
  document.getElementById('cv').style.display='none';
  document.getElementById('home').style.display='flex';
  cur=null;rl();
}

function rm(){
  const c=document.getElementById('msgs');
  c.innerHTML='<div class="ds"><span>Today</span></div>';
  D[cur.id].msgs.forEach((m,i)=>{
    if(i>0&&i%8===0){
      const as=document.createElement('div');as.className='chat-ad';
      as.innerHTML=`<a href="https://www.profitablecpmratenetwork.com/xynu7a44m?key=401dbb5898ee7a6f2672ee9adb4c46d8" target="_blank">Sponsored</a>`;
      c.appendChild(as);
    }
    const w=document.createElement('div');w.className='mwp '+(m.out?'o':'i');
    w.innerHTML=`<div class="msg ${m.out?'o':'i'}">${m.text}<div class="mf"><span class="tt">${m.time}</span>${m.out?`<span class="tk"><svg viewBox="0 0 16 11" fill="none"><path d="M11.071.653L5.186 6.538 2.929 4.281 1.515 5.695l3.671 3.671L12.485 2.067 11.071.653zm2.829 0L7.015 7.538 6.3 6.823 4.886 8.237l2.129 2.129L15.314 2.067 13.9.653z" fill="#53bdeb"/></svg></span>`:''}</div></div>`;
    c.appendChild(w);
  });
  const mw=document.getElementById('mw');mw.scrollTop=mw.scrollHeight;
}

function am(p,tx,out){
  D[p.id].msgs.push({text:tx,out,time:nt()});
  if(cur&&cur.id===p.id){rm();}else if(!out){D[p.id].unread++;showNotif(p,tx);}
}
function dv(p,tx){am(p,tx,false);}

function sendMsg(){
  const inp=document.getElementById('mi'),text=inp.value.trim();
  if(!text||!cur)return;inp.value='';am(cur,text,true);sr(cur,text);
}
document.getElementById('mi').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg();});

function sr(p,ut){
  const tw=document.getElementById('tw'),mw=document.getElementById('mw');
  tw.style.display='block';mw.scrollTop=mw.scrollHeight;
  setTimeout(()=>{
    tw.style.display='none';
    if(p.isRitu){
      if(!D[p.id].rf){D[p.id].rf=true;dv(p,RF2[0]);setTimeout(()=>dv(p,RF2[1]),900);}
      else dv(p,mo()&&Math.random()<0.3?"আমি একটু খাচ্ছি দাঁড়ান":rn(RR));
    } else if(p.isMain){
      if(mo()&&Math.random()<0.2)dv(p,"আমি একটু খাচ্ছি দাঁড়ান আমি একটু পরে ফ্রি হচ্ছি");
      else if(/সাইজ|size/i.test(ut))dv(p,"৩২ কেন?");
      else if(Math.random()<0.2)setTimeout(()=>dv(p,rn(NM)),8000+Math.random()*12000);
      else dv(p,rn(NM));
    } else {
      if(mo()&&Math.random()<0.2)dv(p,"আমি একটু খাচ্ছি দাঁড়ান আমি একটু পরে ফ্রি হচ্ছি");
      else if(Math.random()<0.2)setTimeout(()=>dv(p,rn(GM)),6000+Math.random()*10000);
      else dv(p,rn(GM));
    }
  },1200+Math.random()*2800);
}

// NOTIFICATION
let nft=null;
function showNotif(p,tx){
  clearTimeout(nft);
  document.getElementById('nfi').src=p.img;document.getElementById('nfn').textContent=p.name;document.getElementById('nfm').textContent=tx;
  document.getElementById('nf')._p=p;document.getElementById('nf').style.top='0';
  nft=setTimeout(()=>document.getElementById('nf').style.top='-90px',4500);
}
function openNotif(){
  document.getElementById('nf').style.top='-90px';
  const p=document.getElementById('nf')._p;
  if(p){document.getElementById('home').style.display='flex';document.getElementById('cv').style.display='none';oc(p);}
}

// POPUP AD
function showPop(){
  const pop=document.getElementById('pop');pop.style.display='flex';
  let t=5;const ptb=document.getElementById('ptb'),psk=document.getElementById('psk');
  ptb.textContent=t;psk.style.display='none';
  clearInterval(pTmr);
  pTmr=setInterval(()=>{t--;ptb.textContent=t;if(t<=0){clearInterval(pTmr);ptb.style.display='none';psk.style.display='block';}},1000);
}
// popup every 40s
setInterval(()=>showPop(),40000);

// VIDEO CALL
function startVideoCall(){
  if(!cur)return;const p=cur;
  document.getElementById('cnl').textContent=p.name;document.getElementById('csl').textContent='Calling...';
  document.getElementById('cs').style.display='flex';
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)
    navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{ls=s;document.getElementById('lv').srcObject=s;}).catch(()=>{});
  if(p.isMain){
    document.getElementById('csl').textContent='Ringing...';
    if(Math.random()<0.6){
      setTimeout(()=>{document.getElementById('csl').textContent='';drawCanvas(p);adLoop();setTimeout(()=>{endCall();dv(p,"কেমন?");},62000);},3000);
    } else setTimeout(()=>{endCall();dv(p,"বাবু পরে কল করো আমি এখন ব্যস্ত");},12000);
  } else {
    setTimeout(()=>{document.getElementById('csl').textContent='';drawCanvas(p);adLoop();},2000);
  }
}
function drawCanvas(p){
  const cv2=document.createElement('canvas');cv2.width=480;cv2.height=854;
  const ctx=cv2.getContext('2d'),rv=document.getElementById('rv');
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{let b=1;(function d(){b+=(Math.random()-0.5)*0.005;b=Math.max(0.93,Math.min(1.04,b));ctx.filter=`brightness(${b})`;ctx.drawImage(img,0,0,480,854);requestAnimationFrame(d);})();if(cv2.captureStream)rv.srcObject=cv2.captureStream(15);};
  img.onerror=()=>{ctx.fillStyle='#111';ctx.fillRect(0,0,480,854);if(cv2.captureStream)rv.srcObject=cv2.captureStream(5);};
  img.src=p.img;rv.play().catch(()=>{});
}
function adLoop(){showCallAd();aInt=setInterval(showCallAd,15000);}
function showCallAd(){
  const ao=document.getElementById('ao');ao.style.display='block';
  const bg=document.getElementById('abg');let t=6;bg.textContent=t;bg.onclick=null;
  clearInterval(aCd);
  aCd=setInterval(()=>{t--;bg.textContent=t;if(t<=0){clearInterval(aCd);bg.textContent='✕';bg.onclick=()=>ao.style.display='none';}},1000);
}
function endCall(){
  document.getElementById('cs').style.display='none';
  if(ls){ls.getTracks().forEach(t=>t.stop());ls=null;}
  document.getElementById('rv').srcObject=null;document.getElementById('lv').srcObject=null;
  clearInterval(aInt);clearInterval(aCd);document.getElementById('ao').style.display='none';
}

// AUDIO CALL
function startAudioCall(){
  if(!cur)return;const p=cur;
  document.getElementById('aci').src=p.img;document.getElementById('acn').textContent=p.name;
  document.getElementById('acss').textContent='Ringing...';document.getElementById('ac').style.display='flex';
  setTimeout(()=>{endAudioCall();dv(p,p.isMain?(Math.random()<0.5?"আরে বললাম তো দাঁড়ান আমি একটু খাচ্ছি":"বাবু এখন ব্যস্ত আছি পরে কথা হবে"):"কি বলেন?");},p.isMain?10000:3500);
}
function endAudioCall(){document.getElementById('ac').style.display='none';}

// INIT
rl();
setTimeout(()=>{
  const n=PR[0];
  if(D[n.id].msgs.length===0){
    dv(n,"Hi কি করেন?");
    if(!cur||cur.id!==n.id){D[n.id].unread=1;showNotif(n,"Hi কি করেন?");rl();}
  }
},2000);
// Nadiya periodic
setInterval(()=>{
  const n=PR[0];
  if(D[n.id].msgs.length>0&&Math.random()<0.5){
    const msg=rn(NM);dv(n,msg);
    if(!cur||cur.id!==n.id){D[n.id].unread++;showNotif(n,msg);rl();}
  }
},60000);
